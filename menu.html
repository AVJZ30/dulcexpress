<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DulceXpress · Menú Completo</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cafe-mas-oscuro: #1F1308;
      --cafe-oscuro: #3E2A1F;
      --cafe-intenso: #4F2F1C;
      --cafe-medio: #5E3A2C;
      --cafe-capuchino: #8B5E3C;
      --cafe-lechoso: #B28B6F;
      --cafe-claro: #D9C2A7;
      --cafe-crema: #F2E4D5;
      --dorado-suave: #E0B07F;
      
      --bg-primary: #FBF6EF;
      --text-primary: #2C1A0E;
      --card-bg: rgba(255, 248, 240, 0.9);
      --header-bg: rgba(31, 19, 8, 0.92);
    }

    body.dark-mode {
      --bg-primary: #1a0f08;
      --text-primary: #F5E6D6;
      --card-bg: rgba(40, 25, 15, 0.9);
      --header-bg: rgba(15, 8, 4, 0.95);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
      padding-bottom: 120px;
    }

    #canvas-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.35;
    }

    /* Header */
    header {
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(210, 170, 130, 0.4);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 24px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #C97E4A, #8B4513, #D2691E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo a {
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      color: #F5E6D6;
      transition: all 0.25s;
    }

    .nav-links a:hover {
      color: var(--dorado-suave);
    }

    .theme-toggle {
      background: var(--cafe-medio);
      color: white;
      border: 1px solid var(--dorado-suave);
      padding: 10px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      background: var(--cafe-capuchino);
      transform: scale(1.05);
    }

    /* Contenido principal */
    .menu-container {
      max-width: 1280px;
      margin: 120px auto 40px;
      padding: 0 24px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.8s ease;
    }

    .page-title h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #C97E4A, #D2691E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .page-title p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Grid de productos */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 40px;
    }

    .product-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 2px solid transparent;
      animation: cardGlow 4s infinite alternate;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
    }

    @keyframes cardGlow {
      0% { border-color: rgba(224,176,127,0.2); box-shadow: 0 10px 25px -5px #b28b6f40; }
      100% { border-color: rgba(224,176,127,0.7); box-shadow: 0 20px 35px -5px #8b5e3c60, 0 0 0 2px rgba(224,176,127,0.3); }
    }

    .product-card:hover {
      transform: translateY(-12px);
      border-color: var(--dorado-suave);
    }

    .product-img {
      height: 200px;
      background-size: cover;
      background-position: center;
      border-bottom: 3px solid var(--cafe-capuchino);
      transition: transform 0.4s;
    }

    .product-card:hover .product-img {
      transform: scale(1.05);
    }

    .product-info {
      padding: 25px;
    }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .product-header h3 {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .product-price {
      font-size: 2rem;
      font-weight: 800;
      color: var(--cafe-capuchino);
      text-shadow: 0 2px 10px rgba(201, 126, 74, 0.3);
    }

    .product-price small {
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.8;
    }

    .product-description {
      margin-bottom: 20px;
      line-height: 1.6;
      opacity: 0.9;
    }

    /* Selector de cantidad */
    .quantity-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .quantity-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--cafe-medio);
      color: white;
      border: none;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quantity-btn:hover {
      background: var(--cafe-capuchino);
      transform: scale(1.1);
    }

    .quantity-btn:active {
      transform: scale(0.95);
    }

    .quantity-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .quantity-input {
      width: 60px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      border: 2px solid var(--cafe-lechoso);
      border-radius: 12px;
      padding: 5px;
      background: transparent;
      color: var(--text-primary);
    }

    .add-to-cart-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--cafe-oscuro), var(--cafe-intenso));
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--dorado-suave);
    }

    .add-to-cart-btn:hover {
      background: linear-gradient(135deg, #5A3825, #6B3F2A);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* Carrito flotante */
    .cart-float {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--cafe-oscuro), #2E1B0F);
      backdrop-filter: blur(16px);
      padding: 15px 30px;
      border-radius: 60px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 2px solid var(--dorado-suave);
      display: flex;
      align-items: center;
      gap: 25px;
      z-index: 999;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(100px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .cart-info {
      display: flex;
      align-items: center;
      gap: 20px;
      color: white;
    }

    .cart-items-count {
      background: var(--cafe-capuchino);
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 700;
    }

    .cart-total {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--dorado-suave);
    }

    .checkout-btn {
      background: #25D366;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.1rem;
      color: #1e2a1f;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkout-btn:hover {
      background: #20b859;
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
    }

    .clear-cart-btn {
      background: transparent;
      border: 1px solid #dc3545;
      color: #dc3545;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .clear-cart-btn:hover {
      background: #dc3545;
      color: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .page-title h1 {
        font-size: 2.5rem;
      }
      
      .cart-float {
        flex-direction: column;
        width: 90%;
        padding: 20px;
        bottom: 20px;
      }
      
      .nav-links {
        display: none;
      }
    }
  </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<header>
  <div class="navbar">
    <div class="logo">
      <a href="index.html">
        <h1>DulceXpress</h1>
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
      <a href="index.html#postres"><i class="fas fa-cake"></i> Postres</a>
      <a href="https://www.instagram.com/dulcexpress_ec/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
    </div>
    <button class="theme-toggle" id="themeToggle">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
  </div>
</header>

<main>
  <div class="menu-container">
    <div class="page-title">
      <h1>🍰 Nuestro Menú Artesanal</h1>
      <p>Selecciona tus postres favoritos y personaliza tu pedido</p>
    </div>

    <div class="menu-grid" id="menuGrid">
      <!-- Los productos se generarán con JavaScript -->
    </div>
  </div>
</main>

<div class="cart-float" id="cartFloat" style="display: none;">
  <div class="cart-info">
    <span class="cart-items-count" id="cartCount">0</span>
    <span>productos</span>
    <span class="cart-total" id="cartTotal">$0.00</span>
  </div>
  <div style="display: flex; gap: 10px;">
    <button class="clear-cart-btn" id="clearCartBtn">
      <i class="fas fa-trash"></i> Vaciar
    </button>
    <button class="checkout-btn" id="checkoutBtn">
      <i class="fab fa-whatsapp"></i> Comprar Ahora
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  (function(){
    // ========== DATOS DE PRODUCTOS ==========
    const products = [
      {
        id: 1,
        name: 'Brownie de Chocolate',
        price: 3.50,
        description: 'Intenso, húmedo y con chispas de chocolate belga. El clásico irresistible.',
        image: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&h=300&fit=crop',
        emoji: '🍫'
      },
      {
        id: 2,
        name: 'Cookies Artesanales',
        price: 2.00,
        description: 'Crujientes por fuera, suaves por dentro. Con gotas de chocolate premium.',
        image: 'https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=400&h=300&fit=crop',
        emoji: '🍪'
      },
      {
        id: 3,
        name: 'Cheesecake Cremoso',
        price: 4.50,
        description: 'Suave, cremoso y con base de galleta. Cubierto con frutos rojos.',
        image: 'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=400&h=300&fit=crop',
        emoji: '🧀'
      },
      {
        id: 4,
        name: 'Mosaico de Gelatina',
        price: 3.00,
        description: 'Postre tradicional de gelatinas de colores y leche cremosa. ¡Un clásico!',
        image: 'https://images.unsplash.com/photo-1481391319762-47dff72954d9?w=400&h=300&fit=crop',
        emoji: '🌈'
      }
    ];

    // ========== ESTADO DEL CARRITO ==========
    let cart = JSON.parse(localStorage.getItem('dulcexpress_cart')) || {};
    
    // ========== RENDERIZAR PRODUCTOS ==========
    const menuGrid = document.getElementById('menuGrid');
    
    function renderProducts() {
      menuGrid.innerHTML = products.map(product => {
        const quantity = cart[product.id] || 0;
        return `
          <div class="product-card">
            <div class="product-img" style="background-image: url('${product.image}')"></div>
            <div class="product-info">
              <div class="product-header">
                <h3>${product.emoji} ${product.name}</h3>
                <div class="product-price">$${product.price.toFixed(2)} <small>c/u</small></div>
              </div>
              <p class="product-description">${product.description}</p>
              
              <div class="quantity-selector">
                <button class="quantity-btn" onclick="updateQuantity(${product.id}, -1)">−</button>
                <input type="number" class="quantity-input" id="qty-${product.id}" value="${quantity}" min="0" max="20" readonly>
                <button class="quantity-btn" onclick="updateQuantity(${product.id}, 1)">+</button>
              </div>
              
              <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                <i class="fas fa-cart-plus"></i> Agregar al Carrito
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // ========== ACTUALIZAR CANTIDAD ==========
    window.updateQuantity = function(productId, change) {
      const input = document.getElementById(`qty-${productId}`);
      let newValue = parseInt(input.value) + change;
      if (newValue < 0) newValue = 0;
      if (newValue > 20) newValue = 20;
      input.value = newValue;
    };
    
    // ========== AGREGAR AL CARRITO ==========
    window.addToCart = function(productId) {
      const input = document.getElementById(`qty-${productId}`);
      const quantity = parseInt(input.value);
      
      if (quantity > 0) {
        cart[productId] = quantity;
      } else {
        delete cart[productId];
      }
      
      localStorage.setItem('dulcexpress_cart', JSON.stringify(cart));
      updateCartDisplay();
      
      // Animación de feedback
      const btn = event.target;
      btn.innerHTML = '<i class="fas fa-check"></i> ¡Agregado!';
      btn.style.background = '#25D366';
      setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-cart-plus"></i> Agregar al Carrito';
        btn.style.background = '';
      }, 1500);
    };
    
    // ========== ACTUALIZAR DISPLAY DEL CARRITO ==========
    function updateCartDisplay() {
      const cartFloat = document.getElementById('cartFloat');
      const cartCount = document.getElementById('cartCount');
      const cartTotal = document.getElementById('cartTotal');
      
      const totalItems = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
      const totalPrice = Object.entries(cart).reduce((sum, [id, qty]) => {
        const product = products.find(p => p.id === parseInt(id));
        return sum + (product.price * qty);
      }, 0);
      
      if (totalItems > 0) {
        cartFloat.style.display = 'flex';
        cartCount.textContent = totalItems;
        cartTotal.textContent = `$${totalPrice.toFixed(2)}`;
      } else {
        cartFloat.style.display = 'none';
      }
      
      // Actualizar inputs
      products.forEach(product => {
        const input = document.getElementById(`qty-${product.id}`);
        if (input) {
          input.value = cart[product.id] || 0;
        }
      });
    }
    
    // ========== GENERAR MENSAJE WHATSAPP ==========
    function generateWhatsAppMessage() {
      const horaActual = new Date().getHours();
      let saludo = '';
      
      if (horaActual >= 6 && horaActual < 12) {
        saludo = '🌅 ¡Buenos días!';
      } else if (horaActual >= 12 && horaActual < 19) {
        saludo = '☀️ ¡Buenas tardes!';
      } else {
        saludo = '🌙 ¡Buenas noches!';
      }
      
      let mensaje = `${saludo} Quiero realizar el siguiente pedido en *DulceXpress*:\n\n`;
      mensaje += `🍰 *MI PEDIDO:*\n`;
      mensaje += `━━━━━━━━━━━━━━━━━━\n`;
      
      let total = 0;
      
      Object.entries(cart).forEach(([id, qty]) => {
        const product = products.find(p => p.id === parseInt(id));
        const subtotal = product.price * qty;
        total += subtotal;
        mensaje += `${product.emoji} ${qty}x ${product.name} - $${subtotal.toFixed(2)}\n`;
      });
      
      mensaje += `━━━━━━━━━━━━━━━━━━\n`;
      mensaje += `💰 *TOTAL A PAGAR: $${total.toFixed(2)}*\n\n`;
      mensaje += `✨ ¡Estoy listo para disfrutar de estos deliciosos postres!\n`;
      mensaje += `📍 Por favor, confírmame el tiempo de entrega y los métodos de pago disponibles.`;
      
      return encodeURIComponent(mensaje);
    }
    
    // ========== CHECKOUT ==========
    document.addEventListener('DOMContentLoaded', () => {
      const checkoutBtn = document.getElementById('checkoutBtn');
      const clearCartBtn = document.getElementById('clearCartBtn');
      
      checkoutBtn.addEventListener('click', () => {
        const totalItems = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
        if (totalItems === 0) {
          alert('🛒 Tu carrito está vacío. ¡Agrega algunos postres deliciosos!');
          return;
        }
        
        const mensaje = generateWhatsAppMessage();
        window.open(`https://wa.me/593967816041?text=${mensaje}`, '_blank');
      });
      
      clearCartBtn.addEventListener('click', () => {
        if (confirm('¿Estás seguro de vaciar el carrito?')) {
          cart = {};
          localStorage.removeItem('dulcexpress_cart');
          updateCartDisplay();
          renderProducts();
        }
      });
    });
    
    // ========== TOGGLE MODO OSCURO ==========
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      body.classList.add('dark-mode');
      themeIcon.classList.remove('fa-moon');
      themeIcon.classList.add('fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      const isDark = body.classList.contains('dark-mode');
      
      if (isDark) {
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
        localStorage.setItem('theme', 'dark');
      } else {
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
        localStorage.setItem('theme', 'light');
      }
    });
    
    // ========== FONDO 3D ==========
    const canvas = document.getElementById('canvas-bg');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);
    
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    
    const fragmentShader = `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      
      void main() {
        float m1 = sin(vUv.x * 2.0 + uTime * 0.2) * 0.5 + 0.5;
        float m2 = cos(vUv.y * 1.8 + uTime * 0.15) * 0.5 + 0.5;
        float m3 = sin((vUv.x + vUv.y) * 1.5 + uTime * 0.18) * 0.5 + 0.5;
        
        vec3 c1 = vec3(0.12, 0.08, 0.04);
        vec3 c2 = vec3(0.36, 0.22, 0.14);
        vec3 c3 = vec3(0.55, 0.37, 0.20);
        vec3 c4 = vec3(0.85, 0.76, 0.65);
        
        vec3 mix1 = mix(c1, c2, m1);
        vec3 mix2 = mix(c2, c3, m2);
        vec3 mix3 = mix(c3, c4, m3);
        
        vec3 final = mix(mix1, mix2, 0.6);
        final = mix(final, mix3, 0.3);
        
        gl_FragColor = vec4(final, 1.0);
      }
    `;
    
    const geometry = new THREE.PlaneGeometry(20, 20);
    const material = new THREE.ShaderMaterial({
      vertexShader, fragmentShader,
      uniforms: { uTime: { value: 0 } }
    });
    
    scene.add(new THREE.Mesh(geometry, material));
    
    let clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (material.uniforms) {
        material.uniforms.uTime.value = clock.getElapsedTime();
      }
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Inicializar
    renderProducts();
    updateCartDisplay();
  })();
</script>

</body>
</html>
